<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron & Ivy</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(135deg, #1a2f1a, #0f1a0f); 
            color: #e0f2d9; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0;
        }
        .logo {
            max-width: 420px;
            margin: 20px auto;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(163, 230, 53, 0.4);
        }
        h1 { color: #a3e635; font-size: 2.8em; margin: 10px 0; text-shadow: 0 0 10px #4ade80; }
        .tagline { color: #bef575; font-size: 1.35em; margin-bottom: 30px; }
        .ip { 
            font-size: 1.7em; color: #67e8f9; background: rgba(103, 232, 249, 0.15); 
            padding: 18px; border-radius: 15px; display: inline-block; margin: 25px 0; 
            border: 2px solid #4ade80;
        }
        .mods-btn { 
            display: inline-block; margin: 12px; padding: 16px 38px; 
            background: #4ade80; color: #0f172a; font-size: 1.25em; font-weight: bold;
            border-radius: 50px; text-decoration: none; 
            box-shadow: 0 4px 15px rgba(163, 230, 53, 0.3);
        }
        .mods-btn:hover { background: #a3e635; transform: translateY(-3px); }
    </style>
</head>
<body>
    <img src="logo.png" alt="Iron & Ivy" class="logo">
    
    <h1>Iron & Ivy</h1>
    <p class="tagline">A survival-based engineering world for you and your friends</p>
    
    <div class="ip">
        Server IP: <strong>ironandivy.duckdns.org</strong>
    </div>
    
    <div style="margin: 40px 0;">
        <a href="YOUR_OPTIFINE_MODS_LINK_HERE" class="mods-btn">📥 Optifine Mods</a>
        <a href="YOUR_OCULUS_MODS_LINK_HERE" class="mods-btn">📥 Oculus Mods</a>
    </div>
    
    <p>Extract the chosen modpack and place the files in your mods folder before joining.</p>
    
    <small>Private Minecraft server • Built for creativity and fun</small>
</body>
</html>
